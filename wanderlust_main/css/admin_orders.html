<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders | Admin | WanderLustBagsPH</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../css/admin_style.css">
</head>
<body>
    <div class="admin-wrapper">
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-brand">
                <h2>Wander<span>Lust</span></h2>
                <p>Admin Dashboard</p>
            </div>

            <ul class="sidebar-menu">
                <li><a href="admin_dashboard.html"><i class='bx bx-home'></i> Dashboard</a></li>
                <li><a href="admin_products.html"><i class='bx bx-package'></i> Products</a></li>
                <li><a href="admin_orders.html" class="active"><i class='bx bx-cart'></i> Orders</a></li>
                <li><a href="admin_profile.html"><i class='bx bx-user'></i> Profile</a></li>
                <li><hr class="sidebar-divider"></li>
                <li><a href="#" id="admin-logout"><i class='bx bx-log-out'></i> Logout</a></li>
            </ul>
        </aside>

        <main class="admin-main">
            <header class="admin-topbar">
                <div class="admin-topbar-left">
                    <button class="toggle-sidebar" id="toggleSidebar">
                        <i class='bx bx-menu'></i>
                    </button>
                    <h4>Manage Orders</h4>
                </div>

                <div class="admin-topbar-right">
                    <div class="admin-user" onclick="window.location.href='admin_profile.html'">
                        <div class="avatar">A</div>
                        <div class="user-info">
                            <div class="name" id="adminName">Admin</div>
                            <div class="role">Administrator</div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="admin-content">
                <div class="section-card">
                    <div class="card-header">
                        <h3>All Orders</h3>
                        <span id="orderCount" style="color:#888; font-size:14px;">0 orders</span>
                    </div>

                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Customer</th>
                                    <th>Items</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="ordersTableBody">
                                <tr>
                                    <td colspan="7" style="text-align:center; color:#888;">Loading orders...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../js/admin-orders.js"></script>
    <script type="module">
        document.getElementById('toggleSidebar').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        import { signOut, auth } from "../js/firebase-config.js";
        document.getElementById('admin-logout').addEventListener('click', async (e) => {
            e.preventDefault();
            await signOut(auth);
            window.location.href = 'admin_login.html';
        });
    </script>
</body>
</html>
