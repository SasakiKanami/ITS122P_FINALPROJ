<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Admin | WanderLustBagsPH</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../css/admin_style.css">
</head>
<body>
    <div class="admin-wrapper">
        <aside class="admin-sidebar" id="sidebar">
            <div class="sidebar-brand">
                <h2>Wander<span>Lust</span></h2>
                <p>Admin Dashboard</p>
            </div>

            <ul class="sidebar-menu">
                <li><a href="admin_dashboard.html"><i class='bx bx-home'></i> Dashboard</a></li>
                <li><a href="admin_products.html" class="active"><i class='bx bx-package'></i> Products</a></li>
                <li><a href="admin_orders.html"><i class='bx bx-cart'></i> Orders</a></li>
                <li><a href="admin_profile.html"><i class='bx bx-user'></i> Profile</a></li>
                <li><hr class="sidebar-divider"></li>
                <li><a href="#" id="admin-logout"><i class='bx bx-log-out'></i> Logout</a></li>
            </ul>
        </aside>

        <main class="admin-main">
            <header class="admin-topbar">
                <div class="admin-topbar-left">
                    <button class="toggle-sidebar" id="toggleSidebar">
                        <i class='bx bx-menu'></i>
                    </button>
                    <h4>Manage Products</h4>
                </div>

                <div class="admin-topbar-right">
                    <div class="admin-user" onclick="window.location.href='admin_profile.html'">
                        <div class="avatar">A</div>
                        <div class="user-info">
                            <div class="name" id="adminName">Admin</div>
                            <div class="role">Administrator</div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="admin-content">
                <!-- Add Product Form -->
                <div class="section-card">
                    <div class="card-header">
                        <h3>Add New Product</h3>
                        <button class="btn btn-primary btn-sm" id="toggleFormBtn">Toggle Form</button>
                    </div>

                    <form id="addProductForm" class="admin-form" style="display:none;">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="productName">Product Name *</label>
                                <input type="text" id="productName" placeholder="Enter product name" required>
                            </div>
                            <div class="form-group">
                                <label for="productPrice">Price (₱) *</label>
                                <input type="number" id="productPrice" placeholder="0.00" required step="0.01">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="productCategory">Category</label>
                                <select id="productCategory">
                                    <option value="Bags">Bags</option>
                                    <option value="Accessories">Accessories</option>
                                    <option value="Travel Essentials">Travel Essentials</option>
                                    <option value="Others">Others</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="productStock">Stock Quantity</label>
                                <input type="number" id="productStock" placeholder="10" value="10">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="productDescription">Description</label>
                            <textarea id="productDescription" placeholder="Describe the product..."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="productImage">Image URL</label>
                            <input type="text" id="productImage" placeholder="https://example.com/image.jpg">
                        </div>

                        <button type="submit" class="btn btn-primary">Add Product</button>
                    </form>
                </div>

                <!-- Products Table -->
                <div class="section-card">
                    <div class="card-header">
                        <h3>All Products</h3>
                        <span id="productCount" style="color:#888; font-size:14px;">0 products</span>
                    </div>

                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Image</th>
                                    <th>Product Name</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Stock</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="productsTableBody">
                                <tr>
                                    <td colspan="7" style="text-align:center; color:#888;">Loading products...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../js/admin_products.js"></script>
    <script type="module">
        document.getElementById('toggleSidebar').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        document.getElementById('toggleFormBtn').addEventListener('click', () => {
            const form = document.getElementById('addProductForm');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        });

        import { signOut, auth } from "../js/firebase-config.js";
        document.getElementById('admin-logout').addEventListener('click', async (e) => {
            e.preventDefault();
            await signOut(auth);
            window.location.href = 'admin_login.html';
        });
    </script>
</body>
</html>
